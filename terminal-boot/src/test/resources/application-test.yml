spring:
  application:
    name: terminal-service-test
    
  # 数据源配置 - 由TestContainers动态配置
  datasource:
    # 这些配置会被TestContainers覆盖
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        
  # Redis和MongoDB配置 - 由TestContainers动态配置
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
    mongodb:
      uri: mongodb://localhost:27017/terminal_test
      
  # 禁用某些不必要的自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      
  # 禁用Spring Cloud Nacos配置检查
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
      
# 日志配置
logging:
  level:
    com.colorlight.terminal: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.testcontainers: INFO
    
# 测试专用配置
test:
  # 模拟时钟时间
  fixed-time: "2024-01-01T00:00:00Z"
  
  # WebSocket测试配置
  websocket:
    test-port: 18443
    
  # 设备认证测试配置
  device:
    test-device-id: "TEST_DEVICE_12345"
    test-password: "test_password"

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 0  # 随机端口，避免冲突