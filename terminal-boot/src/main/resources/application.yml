server:
  port: 8088

spring:
  application:
    name: terminal-service

# Terminal WebSocket配置
terminal:
  netty:
    enabled: true
    server:
      host: 0.0.0.0
      port: 8843
      path: /ColorWebSocket/websocket/chat
      boss-threads: 1
      worker-threads: 0  # 0=CPU核心数*2
      keep-alive: true
      tcp-no-delay: true
      so-reuse-addr: true
    heartbeat:
      interval: 55            # 设备心跳间隔(秒)
  
  # Terminal Command配置 - 支持Nacos动态刷新
  command:
    expire:
      hours: 24                     # 指令过期时间(小时)
      auto-clean-enabled: true      # 是否启用自动清理
      clean-interval-minutes: 60    # 清理间隔(分钟)
    cache:
      ttl-hours: 24                 # Redis TTL时间(小时)
      max-commands-per-device: 1000 # 每设备最大缓存数
      deduplication-enabled: true   # 是否启用去重