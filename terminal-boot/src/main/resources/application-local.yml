server:
  port: 8088

spring:
  application:
    name: terminal-service
  cloud:
    nacos:
      discovery:
        enabled: false  # 禁用Spring Cloud Discovery注册
      config:
        import-check:
          enabled: false  # 本地开发时禁用Nacos配置检查

  datasource:
     username: root
     password: Nan12091209
     url: jdbc:mysql://192.168.1.185:3306/terminal?zeroDateTimeBehavior=convertToNull&characterEncoding=utf-8&allowPublicKeyRetrieval=true
     driver-class-name: com.mysql.cj.jdbc.Driver
     hikari:
       maximum-pool-size: 10
       minimum-idle: 2
       connection-timeout: 10000
       idle-timeout: 180000
       max-lifetime: 600000

  data:
    redis:
      host: 192.168.1.185
      port: 6379
      database: 2
      password: Nan12091209
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

    mongodb:
      host: 192.168.1.185
      port: 27017
      database: terminal
      username: root
      password: Nan12091209
      authentication-database: admin
      auto-index-creation: true

dubbo:
  application:
    name: terminal-service
  registry:
    address: nacos://192.168.1.185:8848?namespace=9bc919e2-0ba2-40ed-9ad9-67c85d4cd5e0&username=Nan&password=Nan12091209
    group: DEFAULT_GROUP
    register-mode: interface  # 接口级注册模式
    enable-empty-protection: true
  protocol:
    name: dubbo
    port: 20880
    threads: 100
    serialization: hessian2  # 兼容JDK11和JDK17
  scan:
    base-packages: com.colorlight.terminal  # Dubbo服务扫描包
  consumer:
    timeout: 3000
    retries: 0
    check: false
  provider:
    timeout: 3000
    retries: 0

# Spring Boot Actuator 监控端点配置
management:
  endpoints:
    web:
      exposure:
        # 启用推荐的监控端点（包含自定义端点），排除高风险管理端点
        # 包含：健康检查、应用信息、指标监控、Prometheus、配置属性、环境变量、线程转储、堆转储、WebSocket、设备、线程池
        # 排除：关机、重启等危险操作端点
        include: health,info,metrics,prometheus,configprops,env,threaddump,heapdump,websocket,devices,threadpools,eventloop
        exclude: shutdown,restart
      base-path: /actuator  # Actuator端点的基础路径
  endpoint:
    health:
      # 显示详细健康信息（包含EventLoop监控）
      show-details: always
      # 启用健康检查分组
      group:
        readiness:
          # 就绪状态检查
          include: eventLoop
        liveness:
          # 存活状态检查
          include: eventLoop
    info:
      enabled: true  # 启用info端点，提供应用基本信息
    metrics:
      enabled: true  # 启用metrics端点，提供应用性能指标
    prometheus:
      enabled: true  # 启用prometheus端点，提供Prometheus格式的监控数据
  # 应用信息配置
  info:
    env:
      enabled: true  # 启用环境变量信息
    git:
      mode: full     # Git信息完整模式
    build:
      enabled: true  # 启用构建信息
    java:
      enabled: true  # 启用Java环境信息
  # Micrometer 监控配置
  metrics:
    distribution:
      percentiles-histogram:
        # 为HTTP服务器请求启用百分位直方图
        http.server.requests: true
      percentiles:
        # 配置HTTP服务器请求的监控百分位数
        http.server.requests: 0.5, 0.9, 0.95, 0.99
    tags:
      # 为指标添加通用标签
      application: ${spring.application.name}   # 应用名称标签
      environment: ${spring.profiles.active}    # 环境标签
  prometheus:
    metrics:
      export:
        enabled: true  # 启用Prometheus指标导出
  tracing:
    enabled: true      # 启用分布式追踪
    sampling:
      probability: 1.0 # 追踪采样率100%，生产环境建议调低
  # Zipkin Reporter 的专属配置
  zipkin:
    tracing:
      # 默认 auto-config 会把 span 发到这个端点
      # 没有部署zipkin就不需要配置
      endpoint: http://192.168.1.185:9411/api/v2/spans  # Zipkin服务端点

# 本地环境日志配置 - 更详细的日志便于调试
logging:
  level:
    root: INFO
    com.colorlight.terminal: DEBUG
    org.springframework: WARN
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG
    io.netty: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true

# Terminal Service项目配置
# 这里展示完整的配置，实际不需要每个都配置，可以使用默认值
terminal:
  # netty服务器配置
  netty:
    enabled: true
    server:
      host: 0.0.0.0
      port: 8443                              # 和播放盒二次开发文档对齐
      websocket-path: /websocket              # 内部netty的ws端点
      boss-threads: 1
      worker-threads: 0                       # 0=CPU核心数*2
      keep-alive: true
      tcp-no-delay: true
      so-reuse-addr: true
    heartbeat:
      interval: 55                            # 设备心跳间隔(秒),和播放盒二次开发文档对齐
  # WebSocket连接统计配置示例
  websocket:
    stats:
      # 是否启用WebSocket统计信息定时输出
      enabled: true
      # 统计信息输出间隔(毫秒) - 默认5分钟
      interval: 300000
      # 统计任务初始延迟(毫秒) - 默认2分钟
      initial-delay: 120000
      # 是否启用详细的分片信息输出
      detail-enabled: true
      # 是否启用负载均衡分析
      load-balance-analysis-enabled: true
      # 是否启用可视化条形图输出
      visual-bar-enabled: true
      # 负载均衡警告阈值
      # 当最大分片/最小分片的比率超过此值时发出警告
      load-balance-warning-threshold: 2.0
    protocol:  # websocket协议版本配置
      versions:
        "1.0": true  # v1.0版本
        "1.1": true  # v1.1版本
    connection:
      # 是否启用连接清理
      cleanup-enabled: true
      # 连接清理间隔(毫秒) - 默认10分钟
      cleanup-interval: 600000
      # 心跳超时阈值(毫秒)
      # 默认65秒，比WebSocket心跳间隔(55秒)多10秒容错
      heartbeat-timeout: 65000
      # 是否启用紧急统计信息输出
      # 在连接数异常时输出详细调试信息
      emergency-stats-enabled: true
  # 终端指令配置 - 支持Nacos动态刷新
  command:
    expire:
      hours: 24                     # 指令过期时间(小时)
      auto-clean-enabled: true      # 是否启用自动清理
      clean-interval-minutes: 60    # 清理间隔(分钟)
    cache:
      ttl-hours: 24                 # Redis TTL时间(小时) 要与expire.hours一致
      max-commands-per-device: 1000 # 每台设备最大缓存数
      deduplication-enabled: true   # 是否启用去重（去重是去掉旧的指令保留新的指令）

  # 设备在线状态管理配置
  device:
    offline-check:
      enabled: true                 # 启用离线检测（定时刷Redis状态改变终端状态）
      interval: 30000               # 检查间隔(毫秒) 30秒 （一般看规定的离线判断阈值，小于即可，影响判断延迟而已）
      initial-delay: 60000          # 初始延迟(毫秒) 60秒  （启动后多久开始刷新，一般服务器启动会请求暴增，建议延后一点执行）
      timeout-threshold: 70000      # 离线超时阈值(毫秒) 70秒 （判断终端离线的阈值，本来规定的60秒，这里再加10秒，不影响）
      statistics-interval: 300000   # 统计信息输出间隔(毫秒) 5分钟 （定时打印在线情况日志）
    status-update:
      redis-ttl: 3600                # Redis终端状态初始TTL(秒) 1小时 （终端状态Redis缓存的过期时间，离线检查只改状态不删缓存）
      reconnect-ttl: 120            # 终端重连窗口时间 （终端被标记离线后，120s过期）
      http-enabled: true            # 启用HTTP请求状态更新 （终端调用http请求时刷新最后上报时间）
      websocket-enabled: true       # 启用WebSocket状态更新 （终端websocket交互刷新最后上报时间，连接、消息、心跳都算）
      async-enabled: true           # 启用异步状态更新 （异步变更终端状态，不阻塞业务接口）
      buffer-pool:
        window-ms: 2000             # 缓冲窗口时间(毫秒) 2秒  （异步变更，缓冲池里的状态数据多久处理一次）
        max-size: 10000             # 最大缓冲数量 （缓存池队列长度）
        batch-size: 100             # 批处理大小 （每次处理时，单次批处理数量）
        emergency-flush-enabled: true  # 启用紧急刷新 - 应该暂时用不上，代码里注释了（状态信息入池的时候检查是否数量达到阈值，达到则立刻触发刷新）
        emergency-flush-threshold: 0.8  # 紧急刷新阈值(80%) （如上）
        statistics-interval: 300000 # 统计信息输出间隔(毫秒) 5分钟 （缓冲池处理的统计信息）
      stream-query:
        enabled: true               # 启用Redis Stream查询 （数据量大的时候用流查，防止爆内存，估计没有这个时候）
        page-size: 1000             # 分页大小 （流+分页，防止爆内存）
        max-iterations: 1000        # 最大迭代次数
        timeout-ms: 5000            # 查询超时时间(毫秒)
    spring-event:
      enabled: true               # 启用Spring事件发布 （发状态变更的事件）
      async: true                 # 异步处理事件 （异步线程池处理）
    expiration-listener:
      enabled: true               # 启用过期监听器 （监听终端状态过期键，兜底处理）
      auto-fresh-enabled: true  # 启用自动刷新（定时检查一直在线的终端，延长上线时间键的过期时间）
      stream-query-threshold: 2000    # 流式查询阈值 - 超过此数量使用流式查询 （查需要延长过期时间的终端的流处理阈值）
    startup-cleanup:
      enabled: true                 # 启用启动时缓存清理（解决服务器宕机重启后的僵尸缓存问题）
    # 定时任务启动配置
    task-startup:
      # 启用交错启动，避免多任务同时启动资源竞争
      staggered-enabled: true
      # 基础延迟时间（1分钟）- 应用启动后等待1分钟再开始执行定时任务
      base-delay-ms: 60000
      # 缓冲池任务额外延迟（15秒）- 在基础延迟基础上再延迟15秒
      # 最终延迟 = 60000 + 15000 = 75秒
      buffer-pool-delay-ms: 15000
      # 统计任务额外延迟（120秒）- 在基础延迟基础上再延迟120秒
      # 最终延迟 = 60000 + 120000 = 180秒（3分钟）
      statistics-delay-ms: 120000
  storage:
    minio:
      endpoint: http://192.168.51.114:9000
      access-key: ccloud
      secret-key: colorlight
      bucket: device-screenshots


