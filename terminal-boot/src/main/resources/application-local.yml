      show-details: always
    metrics:
      enabled: true

# 本地环境日志配置 - 更详细的日志便于调试
logging:
  level:
    root: INFO
    com.colorlight.terminal: DEBUG
    org.springframework: WARN
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG
    io.netty: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true

# Terminal Service项目配置
# 这里展示完整的配置，实际不需要每个都配置，可以使用默认值
terminal:
  # netty服务器配置
  netty:
    enabled: true
    server:
      host: 0.0.0.0
      port: 8843                              # 和播放盒二次开发文档对齐
      path: /ColorWebSocket/websocket/chat    # 和播放盒二次开发文档对齐
      boss-threads: 1
      worker-threads: 0                       # 0=CPU核心数*2
      keep-alive: true
      tcp-no-delay: true
      so-reuse-addr: true
    heartbeat:
      interval: 55                            # 设备心跳间隔(秒),和播放盒二次开发文档对齐

  # 终端指令配置 - 支持Nacos动态刷新
  command:
    expire:
      hours: 24                     # 指令过期时间(小时)
      auto-clean-enabled: true      # 是否启用自动清理
      clean-interval-minutes: 60    # 清理间隔(分钟)
    cache:
      ttl-hours: 24                 # Redis TTL时间(小时) 要与expire.hours一致
      max-commands-per-device: 1000 # 每台设备最大缓存数
      deduplication-enabled: true   # 是否启用去重（去重是去掉旧的指令保留新的指令）

  # 设备在线状态管理配置
  device:
    offline-check:
      enabled: true                 # 启用离线检测（定时刷Redis状态改变终端状态）
      interval: 30000               # 检查间隔(毫秒) 30秒 （一般看规定的离线判断阈值，小于即可，影响判断延迟而已）
      initial-delay: 60000          # 初始延迟(毫秒) 60秒  （启动后多久开始刷新，一般服务器启动会请求暴增，建议延后一点执行）
      timeout-threshold: 70000      # 离线超时阈值(毫秒) 70秒 （判断终端离线的阈值，本来规定的60秒，这里再加10秒，不影响）
      statistics-interval: 300000   # 统计信息输出间隔(毫秒) 5分钟 （定时打印在线情况日志）
    status-update:
      redis-ttl: 120                # Redis状态TTL(秒) 2分钟 （终端状态Redis缓存的过期时间，离线检查只改状态不删缓存）
      http-enabled: true            # 启用HTTP请求状态更新 （终端调用http请求时刷新最后上报时间）
      websocket-enabled: true       # 启用WebSocket状态更新 （终端websocket交互刷新最后上报时间，连接、消息、心跳都算）
      async-enabled: true           # 启用异步状态更新 （异步变更终端状态，不阻塞业务接口）
      buffer-pool:
        window-ms: 2000             # 缓冲窗口时间(毫秒) 2秒  （异步变更，缓冲池里的状态数据多久处理一次）
        max-size: 10000             # 最大缓冲数量 （缓存池队列长度）
        batch-size: 100             # 批处理大小 （每次处理时，单次批处理数量）
        emergency-flush-enabled: true  # 启用紧急刷新 - 应该暂时用不上，代码里注释了（状态信息入池的时候检查是否数量达到阈值，达到则立刻触发刷新）
        emergency-flush-threshold: 0.8  # 紧急刷新阈值(80%) （如上）
        statistics-interval: 300000 # 统计信息输出间隔(毫秒) 5分钟 （缓冲池处理的统计信息）
      stream-query:
        enabled: true               # 启用Redis Stream查询 （数据量大的时候用流查，防止爆内存，估计没有这个时候）
        page-size: 1000             # 分页大小 （流+分页，防止爆内存）
        max-iterations: 1000        # 最大迭代次数
        timeout-ms: 5000            # 查询超时时间(毫秒)
    spring-event:
      enabled: true               # 启用Spring事件发布 （发状态变更的事件）
      async: true                 # 异步处理事件 （异步线程池处理）
    expiration-listener:
      enabled: true               # 启用过期监听器 （监听终端状态过期键，兜底处理）
      online-time-ttl-hours: 24   # 上线时间TTL(小时) （记录终端的上线时间，统计在线时长用的）
      auto-fresh-enabled: true  # 启用自动刷新（定时检查一直在线的终端，延长上线时间键的过期时间）
      ttl-refresh-interval-hours: 23  # TTL刷新间隔(小时) - 略小于TTL避免过期 （自动刷新任务的执行间隔）
      stream-query-threshold: 2000    # 流式查询阈值 - 超过此数量使用流式查询 （查需要延长过期时间的终端的流处理阈值）


